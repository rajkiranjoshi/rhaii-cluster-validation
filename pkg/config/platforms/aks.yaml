platform: AKS

agent:
  requests:
    cpu: "500m"
    memory: "512Mi"
  annotations: {}

jobs:
  requests:
    cpu: "500m"
    memory: "512Mi"
    rdma/shared_ib: "1" # Boolean flag, not a count.
  limits:
    rdma/shared_ib: "1" # Boolean flag, not a count.
  annotations: {}
  rdma_type: ib

gpu:
  min_driver_version: "535.0"

thresholds:
  tcp_bandwidth_gbps:
    pass: 5
    warn: 2
    fail: 1
  rdma_bandwidth_pd_gbps:
    pass: 180
    warn: 100
    fail: 50
  rdma_bandwidth_wep_gbps:
    pass: 350
    warn: 200
    fail: 100
